<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yangzi's zone</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        :root {
            --spacing-unit: 8px;
            --line-color: #f0ede5; 
            --bg-dark: #000000; 
            --font-main: "Helvetica", "Arial", "PingFang SC", sans-serif;
            --dice-size: 60px;
            --bounce-transition: cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        body {
            margin: 0;
            background-color: var(--bg-dark);
            /* 精致微型星空背景 */
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" viewBox="0 0 100 100"><g stroke="%23f0ede5" stroke-width="0.2" fill="none" opacity="0.15" stroke-linecap="round" stroke-linejoin="round"><path d="M12,8 Q15,10 18,12 L15,15 Q12,13 9,11 Z" transform="translate(10,10) rotate(-10) scale(0.4)"/><path d="M78,65 L81,63 L84,65 L83,61 L85,58 L81,58 L80,55 L79,58 L75,58 L77,61 Z" transform="translate(-15,-15) rotate(25) scale(0.5)"/></g></svg>');
            background-repeat: repeat;
            background-size: 600px 600px;
            font-family: var(--font-main);
            color: var(--line-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        header {
            position: absolute;
            top: 60px;
            text-align: center;
            letter-spacing: 4px;
        }

        header h1 {
            font-size: 20px;
            font-weight: 300;
            margin: 0;
            text-transform: uppercase;
        }

        #music-control {
            position: fixed; top: 20px; right: 20px;
            background: rgba(240, 237, 229, 0.05); border: 1px solid var(--line-color);
            color: var(--line-color); border-radius: 50%; width: 36px; height: 36px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 18px; z-index: 100; opacity: 0.5;
            transition: opacity 0.3s; filter: url(#rough-edge);
        }

        .main-container { display: flex; flex-direction: column; align-items: center; margin-top: 40px; position: relative; }

        .scene { width: var(--dice-size); height: var(--dice-size); perspective: 600px; cursor: pointer; z-index: 10; }

        .dice {
            width: 100%; height: 100%; position: relative; transform-style: preserve-3d;
            transform: rotateX(-20deg) rotateY(30deg); transition: transform 0.8s var(--bounce-transition);
        }

        .dice-face {
            position: absolute; width: var(--dice-size); height: var(--dice-size);
            background: var(--bg-dark); border: 1.2px solid var(--line-color);
            display: flex; justify-content: center; align-items: center;
            font-size: 24px; border-radius: 10px;
            filter: url(#rough-edge);
        }

        .front  { transform: rotateY(0deg) translateZ(30px); }
        .back   { transform: rotateY(180deg) translateZ(30px); }
        .right  { transform: rotateY(90deg) translateZ(30px); }
        .left   { transform: rotateY(-90deg) translateZ(30px); }
        .top    { transform: rotateX(90deg) translateZ(30px); }
        .bottom { transform: rotateX(-90deg) translateZ(30px); }

        #advice-bubble {
            position: absolute; bottom: calc(100% + 40px); 
            background: var(--line-color); color: #1a1a1d; 
            padding: 24px; border-radius: 24px; width: 260px; font-size: 13px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4); display: none; opacity: 0;
            transform: translateY(15px) scale(0.9); transition: all 0.5s var(--bounce-transition);
            z-index: 20;
        }

        #advice-bubble.active { display: block; opacity: 1; transform: translateY(0) scale(1); }
        
        #advice-bubble::after {
            content: ''; position: absolute; top: 100%; left: 50%; margin-left: -8px;
            border-width: 8px; border-style: solid; border-color: var(--line-color) transparent transparent transparent;
        }

        .ai-title { font-weight: bold; font-size: 16px; display: block; margin-bottom: 8px; border-bottom: 1px solid rgba(0,0,0,0.1); padding-bottom: 4px;}
        #b-desc { line-height: 1.8; }

        #reset-btn {
            margin-top: 40px; padding: 10px 24px; background: transparent;
            color: var(--line-color); border: 1px solid var(--line-color);
            border-radius: 20px; font-size: 12px; cursor: pointer; opacity: 0; pointer-events: none;
            transition: all 0.3s ease; filter: url(#rough-edge);
        }
        #reset-btn.visible { opacity: 0.6; pointer-events: auto; }
        #history { margin-top: 24px; display: flex; gap: 8px; height: 20px; font-size: 14px; opacity: 0.3; }

        .loading:after { content: '...'; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 0; } 50% { opacity: 1; } }
    </style>
</head>
<body>

    <svg style="position: absolute; width: 0; height: 0;">
        <filter id="rough-edge">
            <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="2" result="noise" />
            <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.5" />
        </filter>
    </svg>

    <audio id="bgm" loop><source src="bgm.mp3" type="audio/mpeg"></audio>
    <audio id="click-sound"><source src="click-sound.mp3" type="audio/mpeg"></audio>

    <header>
        <h1>  </h1>
        <p style="font-size: 10px; opacity: 0.5; margin-top: 5px;">  </p>
    </header>

    <div id="music-control" onclick="toggleMusic()">🔊</div>

    <div class="main-container">
        <div id="advice-bubble">
            <span class="ai-title">深夜调酒师</span>
            <div id="b-desc"></div>
        </div>

        <div class="scene" onclick="roll()">
            <div class="dice" id="dice">
                <div class="dice-face front">1</div><div class="dice-face back">6</div>
                <div class="dice-face right">3</div><div class="dice-face left">4</div>
                <div class="dice-face top">2</div><div class="dice-face bottom">5</div>
            </div>
        </div>

        <button id="reset-btn" onclick="resetGame()">再次启程</button>
        <div id="history"></div>
    </div>

    <script>
        let totalScore = 0; let isAdviceShown = false; let isRolling = false; let isMusicPlaying = false;
        
        const dice = document.getElementById('dice');
        const bubble = document.getElementById('advice-bubble');
        const resetBtn = document.getElementById('reset-btn');
        const bgm = document.getElementById('bgm');
        const clickSound = document.getElementById('click-sound');
        const musicControl = document.getElementById('music-control');
        const angleMap = { 1: {x:0, y:0}, 2: {x:-90, y:0}, 3: {x:0, y:-90}, 4: {x:0, y:90}, 5: {x:90, y:0}, 6: {x:180, y:0} };

        function toggleMusic() {
            if (isMusicPlaying) { bgm.pause(); musicControl.innerText = "🔇"; musicControl.style.opacity = 0.4;
            } else { bgm.play(); musicControl.innerText = "🔊"; musicControl.style.opacity = 1; }
            isMusicPlaying = !isMusicPlaying;
        }

        function roll() {
            if (isAdviceShown || isRolling) return;
            clickSound.currentTime = 0; clickSound.play();
            isRolling = true;
            const result = Math.floor(Math.random() * 6) + 1;
            const randX = (Math.floor(Math.random() * 2) + 2) * 360;
            const randY = (Math.floor(Math.random() * 2) + 2) * 360;
            dice.style.transform = `rotateX(${randX + angleMap[result].x}deg) rotateY(${randY + angleMap[result].y}deg)`;
            
            setTimeout(() => {
                isRolling = false; totalScore += result;
                const span = document.createElement('span');
                span.innerText = result + " ";
                document.getElementById('history').appendChild(span);
                if (totalScore >= 10) showAIAdvice();
            }, 800);
        }

        async function showAIAdvice() {
    isAdviceShown = true;
    bubble.style.display = 'block';
    
    // 注意：根据你的截图，你的 ID 叫 'b-desc'
    const descElement = document.getElementById('b-desc'); 
    
    // 1. 先显示一个优雅的加载状态
    descElement.innerHTML = '正在为你调配今晚的灵感...';
    setTimeout(() => { bubble.classList.add('active'); }, 50);

    try {
        const response = await fetch('/api/recommend', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ score: totalScore }) 
        });

        if (!response.ok) throw new Error('Network response was not ok');

        const data = await response.json();
        
        // 2. 核心修正：精准提取 AI 的回复内容
        if (data.choices && data.choices[0] && data.choices[0].message) {
            const advice = data.choices[0].message.content;
            
            // 3. 清空加载文字，开始播放打字机效果
            descElement.innerHTML = ''; 
            typeWriter(advice, descElement);
        } else {
            throw new Error('Unexpected data structure');
        }
    } catch (e) {
        console.error("AI 呼叫失败:", e);
        // 4. 如果 AI 没响应，显示你的兜底文案
        descElement.innerHTML = '';
        typeWriter("今晚的月色很美，适合去进贤路走走。虽然调酒师暂时不在，但那里的晚风从不爽约。", descElement);
    }
    
    // 显示重新开始按钮
    resetBtn.classList.add('visible');
}

        function typeWriter(text, element) {
            let i = 0; element.innerHTML = "";
            function type() {
                if (i < text.length) {
                    element.innerHTML += text.charAt(i);
                    i++; setTimeout(type, 50);
                }
            }
            type();
        }

        function resetGame() {
            bubble.classList.remove('active'); resetBtn.classList.remove('visible');
            setTimeout(() => { 
                bubble.style.display = 'none'; totalScore = 0; 
                document.getElementById('history').innerHTML = ''; isAdviceShown = false;
                dice.style.transform = `rotateX(-20deg) rotateY(30deg)`; 
            }, 400);
        }
    </script>
</body>
</html>
